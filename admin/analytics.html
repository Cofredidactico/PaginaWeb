<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytics · Cofre Didáctico</title>
<link rel="icon" href="../logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#D97757;--accent:#FF8A4C;
  --ink:#1A2744;--ink-4:#9CA3AF;
  --bg:#FBF7F2;--bg-2:#F5EFE7;--line:#E8DFD0;
  --f:'Inter',system-ui,sans-serif;--f-d:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--f);background:#0F1117;color:#fff;height:100%;overflow:hidden;}
a{color:inherit;text-decoration:none;}
button{font:inherit;border:none;cursor:pointer;background:none;color:inherit;}

.hdr{
  padding:12px 24px;
  background:rgba(15,17,23,.95);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:fixed;top:0;left:0;right:0;z-index:10;
  backdrop-filter:blur(12px);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{height:32px;border-radius:7px;}
.brand-tx{font-family:var(--f-d);font-weight:700;font-size:.95rem;color:#fff;}
.brand-tx em{color:var(--accent);font-style:normal;}
.brand-sub{font-size:.68rem;color:rgba(255,255,255,.4);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;font-weight:700;padding:7px 14px;border-radius:9px;font-size:.82rem;transition:all .15s;}
.btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1);}
.btn-ghost:hover{background:rgba(255,255,255,.14);}
.btn-ext{background:var(--primary);color:#fff;}
.btn-ext:hover{opacity:.9;}

.frame-wrap{
  position:fixed;
  top:57px;left:0;right:0;bottom:0;
}
iframe{
  width:100%;height:100%;
  border:none;
  display:block;
}

/* Loading overlay */
.loader{
  position:absolute;inset:0;
  background:#0F1117;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:5;transition:opacity .4s;
}
.loader.gone{opacity:0;pointer-events:none;}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:rot 1s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.loader p{font-size:.88rem;color:rgba(255,255,255,.4);}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand">
    <img src="../logo.png" alt="" onerror="this.style.display='none'" />
    <div>
      <div class="brand-tx">Cofre <em>Didáctico</em></div>
      <div class="brand-sub">Analytics</div>
    </div>
  </div>
  <div class="hdr-actions">
    <a href="https://cloud.umami.is/share/QK8Q8h1iTqkbhjSu" target="_blank" rel="noopener" class="btn btn-ghost">↗ Ver en Umami</a>
    <a href="../" target="_blank" rel="noopener" class="btn btn-ghost">👀 Ver sitio</a>
    <a href="index.html" class="btn btn-ext">← Panel</a>
  </div>
</header>

<div class="frame-wrap">
  <div class="loader" id="loader">
    <div class="spin"></div>
    <p>Cargando analytics...</p>
  </div>
  <iframe
    src="https://cloud.umami.is/share/QK8Q8h1iTqkbhjSu"
    title="Analytics · Cofre Didáctico"
    onload="document.getElementById('loader').classList.add('gone')"
    allow="fullscreen"
  ></iframe>
</div>

</body>
</html>
