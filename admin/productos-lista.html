<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mis productos · Cofre Didáctico</title>
<link rel="icon" href="../logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#D97757;--primary-soft:#FBE5DC;--primary-dark:#B85A3E;
  --green:#4A8F5C;--green-soft:#DBEDDF;
  --red:#C0392B;--red-soft:#FDECEA;
  --ink:#1A2744;--ink-2:#3E4A65;--ink-3:#6B7280;--ink-4:#9CA3AF;
  --bg-1:#FBF7F2;--bg-2:#F5EFE7;--bg-3:#EDE4D6;--line:#E8DFD0;
  --f:'Inter',system-ui,sans-serif;--f-d:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--f);background:var(--bg-1);color:var(--ink);min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{font:inherit;border:none;cursor:pointer;background:none;color:inherit;}

.hdr{padding:15px 0;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:10;}
.hdr-in{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--ink-3);font-weight:700;font-size:.85rem;padding:7px 12px;border-radius:9px;}
.back:hover{background:var(--bg-2);color:var(--ink);}
.brand{font-family:var(--f-d);font-weight:700;font-size:1rem;}
.brand em{color:var(--primary);font-style:normal;}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:700;padding:9px 16px;border-radius:10px;font-size:.86rem;transition:transform .12s,box-shadow .15s;}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px -6px rgba(217,119,87,.5);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-ghost{background:var(--bg-2);color:var(--ink);}
.btn-ghost:hover{background:var(--bg-3);}

.page{max-width:1100px;margin:0 auto;padding:24px 24px 60px;}

/* Hero */
.hero{margin-bottom:24px;}
.hero h1{font-family:var(--f-d);font-size:1.8rem;font-weight:700;margin-bottom:4px;}
.hero h1 em{color:var(--primary);font-style:normal;}
.hero p{font-size:.9rem;color:var(--ink-3);}

/* Token banner */
.token-banner{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.token-banner.ok{border-color:var(--green);background:var(--green-soft);}
.token-banner .tb-body{flex:1;min-width:200px;}
.token-banner .tb-body strong{display:block;font-size:.9rem;margin-bottom:3px;}
.token-banner .tb-body p{font-size:.78rem;color:var(--ink-3);line-height:1.4;}
.token-banner .tb-body p a{color:var(--primary);font-weight:700;}
.token-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.token-row input{flex:1;min-width:160px;padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;font:inherit;font-size:.84rem;}
.token-row input:focus{outline:none;border-color:var(--primary);}

/* Barra de búsqueda y filtros */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-box{flex:1;min-width:200px;position:relative;}
.search-box input{width:100%;padding:10px 16px 10px 38px;border:1.5px solid var(--line);border-radius:10px;font:inherit;font-size:.88rem;background:#fff;}
.search-box input:focus{outline:none;border-color:var(--primary);}
.search-box::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.85rem;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fb{padding:6px 12px;border-radius:99px;font-size:.76rem;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--ink-3);cursor:pointer;transition:all .15s;}
.fb:hover{border-color:var(--primary);color:var(--primary);}
.fb.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-dark);}
.count{font-size:.8rem;color:var(--ink-4);white-space:nowrap;align-self:center;}

/* Grid de productos */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}

/* Card de producto */
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:transform .15s,box-shadow .2s,border-color .2s;position:relative;}
.pcard:hover{transform:translateY(-2px);box-shadow:0 10px 28px -10px rgba(26,39,68,.12);border-color:var(--primary);}
.pcard-img{width:100%;aspect-ratio:4/3;background:var(--bg-2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;}
.pcard-img img{width:100%;height:100%;object-fit:cover;}
.pcard-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:99px;font-size:.66rem;font-weight:700;}
.pb-nuevo{background:#FEF3C7;color:#92400E;}
.pb-mv{background:var(--primary-soft);color:var(--primary-dark);}
.pb-oferta{background:var(--red-soft);color:var(--red);}
.pb-dest{background:var(--green-soft);color:var(--green);}
.pb-inact{background:#F1F5F9;color:#64748B;}
.pcard-body{padding:13px;}
.pcard-tipo{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);margin-bottom:3px;}
.pcard-name{font-family:var(--f-d);font-size:.92rem;font-weight:700;line-height:1.2;margin-bottom:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pcard-desc{font-size:.76rem;color:var(--ink-3);line-height:1.4;margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.2em;}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pcard-price{font-family:var(--f-d);font-size:1.05rem;font-weight:800;color:var(--ink);}
.pcard-price.free{color:var(--green);}
.pcard-price .old{font-size:.72rem;color:var(--ink-4);text-decoration:line-through;font-family:var(--f);font-weight:400;margin-left:3px;}
.btn-edit{display:inline-flex;align-items:center;gap:5px;background:var(--primary-soft);color:var(--primary-dark);font-weight:700;font-size:.75rem;padding:6px 11px;border-radius:8px;transition:background .15s;}
.btn-edit:hover{background:var(--primary);color:#fff;}

/* Warn dot */
.warn-dot{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#F59E0B;border:2px solid #fff;cursor:help;}

/* Estado vacío */
.empty{padding:60px 20px;text-align:center;color:var(--ink-4);}
.empty .em{font-size:3rem;margin-bottom:10px;}
.empty p{font-size:.9rem;}

/* Skeleton */
.skel{background:linear-gradient(110deg,var(--bg-2) 8%,var(--bg-3) 18%,var(--bg-2) 33%);background-size:200% 100%;animation:sh 1.4s linear infinite;border-radius:8px;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.skel-img{width:100%;aspect-ratio:4/3;}
.skel-body{padding:13px;display:flex;flex-direction:column;gap:8px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;padding:9px 16px;border-radius:9px;font-weight:600;font-size:.82rem;opacity:0;transition:opacity .22s,transform .22s;z-index:99;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <a href="index.html" class="back">← Panel</a>
    <div class="brand">Mis <em>productos</em></div>
    <a href="producto-editor.html" class="btn btn-primary">＋ Nuevo producto</a>
  </div>
</header>

<div class="page">
  <div class="hero">
    <h1>Todos tus <em>productos</em></h1>
    <p>Hacé clic en "Editar" para modificar cualquier producto directo desde acá.</p>
  </div>

  <!-- TOKEN BANNER -->
  <div class="token-banner" id="token-banner">
    <div style="font-size:1.4rem;">🔑</div>
    <div class="tb-body">
      <strong>Conectar con GitHub para ver tus productos</strong>
      <p>Necesitás un <a href="https://github.com/settings/tokens/new?scopes=repo&description=Cofre+Panel" target="_blank" rel="noopener">Personal Access Token (scope repo) →</a></p>
      <div class="token-row">
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
        <button class="btn btn-primary" style="padding:8px 14px;font-size:.82rem;" onclick="guardarToken()">✓ Conectar</button>
      </div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar" style="display:none;">
    <div class="search-box">
      <input id="q" placeholder="Buscar por nombre, tipo o temática..." oninput="render()" />
    </div>
    <div class="filters" id="filters">
      <button class="fb active" data-f="todos" onclick="setFilter(this)">Todos</button>
      <button class="fb" data-f="activo" onclick="setFilter(this)">✅ Activos</button>
      <button class="fb" data-f="inactivo" onclick="setFilter(this)">🔒 Ocultos</button>
      <button class="fb" data-f="gratis" onclick="setFilter(this)">🎁 Gratis</button>
      <button class="fb" data-f="destacado" onclick="setFilter(this)">⭐ Destacados</button>
      <button class="fb" data-f="incompleto" onclick="setFilter(this)">⚠️ Incompletos</button>
    </div>
    <div class="count" id="count"></div>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid">
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:40%;"></div><div class="skel" style="height:16px;width:80%;"></div><div class="skel" style="height:12px;width:65%;"></div></div></div>
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:55%;"></div><div class="skel" style="height:16px;width:70%;"></div><div class="skel" style="height:12px;width:50%;"></div></div></div>
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:35%;"></div><div class="skel" style="height:16px;width:85%;"></div><div class="skel" style="height:12px;width:60%;"></div></div></div>
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:45%;"></div><div class="skel" style="height:16px;width:75%;"></div><div class="skel" style="height:12px;width:55%;"></div></div></div>
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:50%;"></div><div class="skel" style="height:16px;width:80%;"></div><div class="skel" style="height:12px;width:40%;"></div></div></div>
    <div class="skel-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel" style="height:12px;width:30%;"></div><div class="skel" style="height:16px;width:90%;"></div><div class="skel" style="height:12px;width:65%;"></div></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const GH_REPO='Cofredidactico/PaginaWeb',GH_FILE='productos.json',GH_BRANCH='main',KEY='gh_token_panel';
let _prods=[],_filter='todos';
const PLACEHOLDER=['placeholder'];

const getToken=()=>localStorage.getItem(KEY)||'';

function guardarToken(){
  const v=$('#gh-token').value.trim();
  if(!v){toast('Ingresá un token','err');return;}
  localStorage.setItem(KEY,v);
  init();
}

function esIncompleto(p){
  if(!p.imagen||PLACEHOLDER.some(pl=>p.imagen.includes(pl)))return true;
  if(!p.link||!p.link.trim())return true;
  if(!p.descripcion||p.descripcion.trim().length<10)return true;
  return false;
}

async function init(){
  const tk=getToken();
  if(!tk)return;

  // Ocultar token banner
  $('#token-banner').style.display='none';
  $('#toolbar').style.display='flex';

  try{
    const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`,
      {headers:{Authorization:`Bearer ${tk}`,Accept:'application/vnd.github+json'}});
    if(!r.ok)throw new Error(`Error ${r.status} — verificá el token.`);
    const meta=await r.json();
    const data=JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
    _prods=data.productos||[];
    render();
  }catch(e){
    $('#grid').innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="em">⚠️</div><p>${e.message||'No se pudieron cargar los productos.'}</p></div>`;
    toast(e.message||'Error cargando productos','err');
  }
}

function setFilter(btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _filter=btn.dataset.f;
  render();
}

function render(){
  const q=($('#q').value||'').toLowerCase();
  let prods=_prods.filter(p=>{
    if(q&&!(p.nombre||'').toLowerCase().includes(q)&&!(p.tipo||'').toLowerCase().includes(q)&&!(p.tematica||'').toLowerCase().includes(q))return false;
    if(_filter==='activo')return p.activo;
    if(_filter==='inactivo')return!p.activo;
    if(_filter==='gratis')return p.acceso==='gratis';
    if(_filter==='destacado')return p.destacado;
    if(_filter==='incompleto')return esIncompleto(p);
    return true;
  });

  $('#count').textContent=`${prods.length} producto${prods.length!==1?'s':''}`;

  if(!prods.length){
    $('#grid').innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="em">🔍</div><p>No hay productos para este filtro.</p></div>`;
    return;
  }

  const etiqLabels={'mas-vendido':'⭐ Más vendido',nuevo:'🔥 Nuevo',oferta:'🎉 Oferta',destacado:'✨ Destacado'};
  const etiqClass={'mas-vendido':'pb-mv',nuevo:'pb-nuevo',oferta:'pb-oferta',destacado:'pb-dest'};

  $('#grid').innerHTML=prods.map(p=>{
    const hasImg=p.imagen&&!PLACEHOLDER.some(pl=>p.imagen.includes(pl));
    const incompleto=esIncompleto(p);
    const precioLabel=p.acceso==='gratis'
      ?`<span class="pcard-price free">Gratis</span>`
      :`<span class="pcard-price">$${(p.precio||0).toLocaleString('es-AR')}${p.precioTachado?`<span class="old">$${p.precioTachado.toLocaleString('es-AR')}</span>`:''}</span>`;

    let badge='';
    if(!p.activo)badge=`<span class="pcard-badge pb-inact">🔒 Oculto</span>`;
    else if(p.etiqueta)badge=`<span class="pcard-badge ${etiqClass[p.etiqueta]||'pb-nuevo'}">${etiqLabels[p.etiqueta]||p.etiqueta}</span>`;
    else if(p.destacado)badge=`<span class="pcard-badge pb-dest">⭐ Destacado</span>`;

    return `
      <div class="pcard">
        <div class="pcard-img">
          ${hasImg?`<img src="../${p.imagen}" alt="" onerror="this.style.display='none'" />`:'📦'}
          ${badge}
          ${incompleto?`<div class="warn-dot" title="Datos incompletos: revisá imagen, link o descripción"></div>`:''}
        </div>
        <div class="pcard-body">
          <div class="pcard-tipo">${p.tipo||''}${p.nivel?' · '+p.nivel:''}</div>
          <div class="pcard-name">${p.nombre||'Sin nombre'}</div>
          <div class="pcard-desc">${p.descripcion||'<em style="color:var(--ink-4)">Sin descripción</em>'}</div>
          <div class="pcard-foot">
            ${precioLabel}
            <a href="producto-editor.html?id=${encodeURIComponent(p.id||p.nombre)}" class="btn-edit">✏️ Editar</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toast(msg,type=''){
  const t=$('#toast');t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',3000);
}

// Init
if(getToken()){
  $('#token-banner').style.display='none';
  $('#toolbar').style.display='flex';
  init();
}
</script>
</body>
</html>
